<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favorites - Book Explorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <nav class="sticky top-0 z-20 border-b border-slate-200 bg-white/95 backdrop-blur">
    <div class="mx-auto flex max-w-6xl flex-col gap-3 px-4 py-4 sm:flex-row sm:items-center sm:justify-between sm:px-6">
      <a href="index.html" class="flex items-center gap-3 text-xl font-bold tracking-tight text-slate-950">
        <span class="flex h-10 w-10 items-center justify-center rounded-lg bg-teal-700 text-sm font-bold text-white">BE</span>
        <span>Book Explorer</span>
      </a>
      <div class="flex items-center gap-1 rounded-lg bg-slate-100 p-1 text-sm font-medium text-slate-600">
        <a href="index.html" class="rounded-md px-3 py-2 transition hover:bg-white hover:text-slate-950">Home</a>
        <a href="favorites.html" class="rounded-md bg-white px-3 py-2 text-slate-950 shadow-sm">Favorites</a>
        <a href="about.html" class="rounded-md px-3 py-2 transition hover:bg-white hover:text-slate-950">About</a>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch to dark mode" title="Switch to dark mode">
          <img id="theme-icon" src="img/moon.svg" alt="" aria-hidden="true">
        </button>
      </div>
    </div>
  </nav>

  <main class="mx-auto flex max-w-6xl flex-1 flex-col gap-8 px-4 py-8 sm:px-6 lg:py-10">
    <section class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm sm:p-8">
      <div class="flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
      <div>
        <p class="text-sm font-semibold uppercase tracking-wide text-teal-700">Saved library</p>
        <h1 class="mt-2 text-3xl font-bold tracking-tight text-slate-950 sm:text-4xl">Your Favorites</h1>
        <p class="mt-3 max-w-2xl text-base leading-7 text-slate-600">Books you save stay available in this browser until you remove them.</p>
      </div>
      <a href="index.html" class="inline-flex h-11 items-center justify-center rounded-lg bg-teal-700 px-5 text-sm font-semibold text-white shadow-sm transition hover:bg-teal-800 focus:outline-none focus:ring-4 focus:ring-teal-100">Browse books</a>
      </div>
    </section>

    <section>
      <div class="mb-5 flex flex-col gap-2 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <h2 class="text-xl font-bold text-slate-950">Saved Books</h2>
          <p class="mt-1 text-sm text-slate-500">Remove books you no longer need from this list.</p>
        </div>
        <div id="favorites-feedback" class="rounded-full bg-white px-4 py-2 text-sm font-medium text-slate-600 shadow-sm ring-1 ring-slate-200" aria-live="polite"></div>
      </div>
      <div id="favorites-grid" class="grid gap-5 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4"></div>
    </section>
  </main>

  <footer class="border-t border-slate-200 bg-white">
    <div class="mx-auto flex max-w-6xl flex-col gap-2 px-4 py-5 text-sm text-slate-500 sm:flex-row sm:items-center sm:justify-between sm:px-6">
      <p>&copy; 2026 Book Explorer</p>
      <p>Built with HTML, Tailwind CSS, JavaScript, and Open Library.</p>
    </div>
  </footer>

  <script type="module" src="js/theme.js"></script>
  <script type="module" src="js/favorites-page.js"></script>
</body>
</html>
